<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Singapore Gardens by the Bay fallback image</title>
  <desc id="desc">Stylized Supertree Grove scene with glowing garden canopy and a twilight sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#102935"/>
      <stop offset="55%" stop-color="#1a433a"/>
      <stop offset="100%" stop-color="#0c1826"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3b7"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#sky)"/>
  <circle cx="862" cy="160" r="92" fill="#ffb703" opacity="0.14" filter="url(#glow)"/>
