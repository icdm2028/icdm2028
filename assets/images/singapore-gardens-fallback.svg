    <path d="M68 154L182 252L304 146" stroke="url(#canopy)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M28 244L182 284L338 228" stroke="url(#canopy)" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
