    <path d="M178 40C268 40 348 104 362 208C376 310 304 386 198 402C74 420 -32 340 -44 224C-54 114 26 52 178 40Z" fill="rgba(125,211,252,0.18)" stroke="url(#canopy)" stroke-width="6"/>
    <path d="M162 318L188 590" stroke="url(#canopy)" stroke-width="12" stroke-linecap="round"/>
    <path d="M68 154L182 252L304 146" stroke="url(#canopy)" stroke-width="8" stroke-linecap="round" fill="none"/>
